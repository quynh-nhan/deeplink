<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pet Villa - Cẩm Nang Thú Cưng</title>

    <!-- Meta Tags cho Open Graph (Zalo, Facebook, Telegram Preview) -->
    <meta property="og:title" content="Cẩm Nang Chăm Sóc Thú Cưng - The Pet Villa" />
    <meta property="og:description" content="Kiến thức chăm sóc chó mèo chuẩn y khoa từ các chuyên gia hàng đầu." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=600" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts & Tailwind CSS cho giao diện Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Card chuyển hướng cao cấp -->
    <div
        class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl text-center space-y-6 transform transition-all hover:scale-105 duration-300">

        <!-- App Logo & Animation -->
        <div class="relative w-28 h-28 mx-auto">
            <div class="absolute inset-0 rounded-full bg-orange-500 opacity-20 animate-ping"></div>
            <div
                class="relative flex items-center justify-center w-28 h-28 rounded-full bg-gradient-to-tr from-orange-100 to-amber-50 shadow-lg overflow-hidden border border-orange-300">
                <img src="mascot.png" alt="Mascot" class="w-24 h-24 object-contain translate-y-1">
            </div>
        </div>

        <div class="space-y-2">
            <h1 class="text-2xl font-extrabold text-slate-800">The Pet Villa</h1>
            <p class="text-sm font-semibold text-orange-500 tracking-widest uppercase">KNOWLEDGE CENTER</p>
        </div>

        <div class="py-4 space-y-3">
            <div class="flex items-center justify-center space-x-2">
                <svg class="animate-spin h-5 w-5 text-orange-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <span class="text-slate-600 font-medium text-sm">Đang kết nối tới ứng dụng...</span>
            </div>
            <p class="text-xs text-slate-400 px-6">Nếu điện thoại đã cài đặt ứng dụng, hệ thống sẽ tự động chuyển hướng
                bạn trong giây lát.</p>
        </div>

        <!-- Nút bấm thủ công đề phòng trường hợp không tự động nhảy -->
        <div class="pt-2">
            <a id="direct-btn" href="#"
                class="inline-block w-full py-4 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-semibold rounded-2xl shadow-lg shadow-orange-500/20 active:scale-95 transition-all duration-150">
                Mở Trên Ứng Dụng
            </a>
        </div>
    </div>

    <script>
        // Cấu hình URL API Backend (Thay đổi theo tên miền thực tế của bạn)
        const API_BASE_URL = 'https://tumulous-petra-microdont.ngrok-free.dev';

        // Phân tích tham số bài viết từ link web (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        // Tạo Deep Link qua màn hình Home tab của App và truyền redirectPostId
        const deepLink = `clientapp://(tabs)?redirectPostId=${postId || 'd1'}`;

        // Gán link cho nút bấm thủ công
        document.getElementById('direct-btn').href = deepLink;

        // Tự động kích hoạt mở App ngay khi vào trang web
        window.location.href = deepLink;

        // Hàm loại bỏ các thẻ HTML để lấy chuỗi văn bản thuần túy làm mô tả
        function stripHtml(html) {
            const temp = document.createElement("div");
            temp.innerHTML = html;
            return temp.textContent || temp.innerText || "";
        }

        // Lấy thông tin bài viết từ Database để cập nhật giao diện và thẻ Meta
        if (postId && postId !== 'd1') {
            fetch(`${API_BASE_URL}/handbooks/${postId}`)
                .then(response => response.json())
                .then(res => {
                    if (res && res.data && res.data.handbook) {
                        const handbook = res.data.handbook;
                        const title = handbook.Title || 'Cẩm Nang Chăm Sóc Thú Cưng - The Pet Villa';
                        const thumbnail = handbook.Thumbnail || 'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=600';
                        
                        // Lấy mô tả ngắn từ nội dung Content
                        let description = '';
                        if (handbook.Content) {
                            const cleanText = stripHtml(handbook.Content);
                            description = cleanText.substring(0, 150).trim() + '...';
                        } else {
                            description = 'Kiến thức chăm sóc chó mèo chuẩn y khoa từ các chuyên gia hàng đầu.';
                        }

                        // 1. Cập nhật tiêu đề trang web hiển thị trên trình duyệt
                        document.title = title;

                        // 2. Cập nhật các thẻ meta Open Graph (cho trình duyệt hoặc crawlers hỗ trợ JS)
                        const metaTitle = document.querySelector('meta[property="og:title"]');
                        if (metaTitle) metaTitle.setAttribute('content', title);

                        const metaDesc = document.querySelector('meta[property="og:description"]');
                        if (metaDesc) metaDesc.setAttribute('content', description);

                        const metaImage = document.querySelector('meta[property="og:image"]');
                        if (metaImage) metaImage.setAttribute('content', thumbnail);

                        // 3. Cập nhật hiển thị giao diện của trang web
                        // Thay đổi tiêu đề chính
                        const titleEl = document.querySelector('h1');
                        if (titleEl) titleEl.innerText = title;

                        // Hiển thị thêm ảnh bìa bài viết thay cho Mascot nếu lấy được
                        const mascotImg = document.querySelector('img[alt="Mascot"]');
                        if (mascotImg) {
                            mascotImg.src = thumbnail;
                            mascotImg.className = "w-full h-full object-cover";
                            // Bỏ dịch chuyển của mascot cũ
                            mascotImg.classList.remove("translate-y-1");
                        }
                    }
                })
                .catch(err => {
                    console.error("Lỗi khi tải thông tin bài viết từ API:", err);
                });
        }

        // Thiết lập fallback sau 3.5 giây nếu không phản hồi
        setTimeout(() => {
            console.log("Deep link triggered, if app did not open, click the button or download app.");
        }, 3500);
    </script>
</body>

</html>
